<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Count Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!--
  ═══════════════════════════════════════════════════════════════════
  GOOGLE SHEETS INTEGRATION — HOW IT WORKS
  ═══════════════════════════════════════════════════════════════════

  REQUIREMENT: Your Google Sheet must be shared as
  "Anyone with the link → Viewer" (Share → Change to Anyone).

  HOW THE DATA IS FETCHED:
  Google exposes every public sheet through its Visualization API:
    https://docs.google.com/spreadsheets/d/{SHEET_ID}/gviz/tq?tqx=out:json

  The response is a JSON-P-like string we strip to get clean JSON.
  No API keys or OAuth are needed — it works entirely client-side.

  REAL-TIME UPDATES:
  The page polls the sheet every REFRESH_INTERVAL milliseconds.
  Any change saved in the sheet appears here automatically.
  The countdown timer shows how long until the next refresh.

  TO CONNECT YOUR OWN SHEET:
  1. Replace SHEET_ID below with your sheet's ID (from the URL).
  2. Optionally change SHEET_NAME to target a specific tab.
  3. Change REFRESH_INTERVAL to control poll frequency (ms).
  ═══════════════════════════════════════════════════════════════════
  -->

  <style>
    /* ── Brand Tokens ─────────────────────────────────────────── */
    :root {
      --brand-orange: #ff6400;
      --brand-purple: #5000b3;
      --brand-black:  #111111;
      --brand-white:  #ffffff;
      --surface:      #f8f7fc;
      --card-bg:      #ffffff;
      --border:       #e4e0ef;
      --text-primary: #111111;
      --text-muted:   #6b6b80;
      --text-hint:    #9a9aaa;
      --radius:       10px;
      --radius-sm:    6px;
    }

    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Top Nav / Header ─────────────────────────────────────── */
    header {
      background: var(--brand-purple);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--brand-orange);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-dot svg { width: 14px; height: 14px; fill: #fff; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    /* ── Live status pill ─────────────────────────────────────── */
    #status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255,255,255,0.12);
      color: #fff;
      transition: background 0.3s;
    }

    #status-pill.loading  { background: rgba(255,255,255,0.12); }
    #status-pill.live     { background: rgba(0,200,100,0.25); color: #4fffaa; }
    #status-pill.error    { background: rgba(255,60,60,0.25);  color: #ff9090; }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Main Layout ──────────────────────────────────────────── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Toolbar (filter + refresh info) ─────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .search-box {
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      stroke: var(--text-muted);
      fill: none;
    }

    #search-input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px 7px 32px;
      font-size: 13px;
      background: var(--card-bg);
      color: var(--text-primary);
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    #search-input:focus { border-color: var(--brand-purple); }

    #date-filter, #group-filter, #agent-filter {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 13px;
      background: var(--card-bg);
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      max-width: 160px;
    }

    #date-filter:focus, #group-filter:focus, #agent-filter:focus {
      border-color: var(--brand-purple);
    }

    .clear-filters-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-filters-btn:hover {
      border-color: var(--brand-orange);
      color: var(--brand-orange);
    }

    /* ── Multi-select dropdown ───────────────────────────────── */
    .msel {
      position: relative;
      display: inline-block;
    }
    .msel-btn {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 13px;
      background: var(--card-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 130px;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msel-btn:hover, .msel.open .msel-btn { border-color: var(--brand-purple); }
    .msel-btn .count-chip {
      background: var(--brand-purple);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 999px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .msel-btn svg { flex-shrink: 0; opacity: 0.6; width: 12px; height: 12px; }
    .msel-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 50;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(17,17,17,0.12);
      min-width: 220px;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      padding: 6px;
    }
    .msel.open .msel-panel { display: block; }
    .msel-panel-actions {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .msel-panel-actions button {
      background: none;
      border: none;
      color: var(--brand-purple);
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      padding: 2px 4px;
    }
    .msel-panel-actions button:hover { text-decoration: underline; }
    .msel-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
    }
    .msel-option:hover { background: var(--surface); }
    .msel-option input { cursor: pointer; accent-color: var(--brand-purple); }
    .msel-option .opt-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msel-empty { padding: 10px; font-size: 12px; color: var(--text-hint); text-align: center; }

    /* ── Search box ───────────────────────────────────────────── */
    .search-box {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      background: var(--card-bg);
      min-width: 220px;
      flex: 1;
      max-width: 320px;
    }
    .search-box:focus-within { border-color: var(--brand-purple); }
    .search-box svg { width: 14px; height: 14px; stroke: var(--text-hint); flex-shrink: 0; }
    .search-box input {
      border: none;
      outline: none;
      font-size: 13px;
      width: 100%;
      color: var(--text-primary);
      background: transparent;
    }
    .search-box input::placeholder { color: var(--text-hint); }
    .search-box .search-clear {
      background: none; border: none; cursor: pointer; color: var(--text-hint);
      font-size: 14px; padding: 0 2px; display: none;
    }
    .search-box.has-text .search-clear { display: inline-block; }

    /* ── Insights panel ───────────────────────────────────────── */
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .insight-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .insight-card .ic-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .insight-card .ic-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .insight-card .ic-sub {
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 4px;
    }
    .insight-card.accent { border-left: 3px solid var(--brand-orange); }

    /* ── Chart card ───────────────────────────────────────────── */
    .chart-section {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) {
      .chart-section { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .chart-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chart-card canvas { max-height: 260px; }
    .chart-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-hint);
      font-size: 13px;
    }

    .refresh-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--brand-purple);
      background: transparent;
      color: var(--brand-purple);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .refresh-btn:hover { background: var(--brand-purple); color: #fff; }

    .refresh-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    .countdown {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Summary KPI Cards ────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--brand-orange);
      border-radius: 3px 0 0 3px;
    }

    .kpi-card:nth-child(even)::before { background: var(--brand-purple); }

    .kpi-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* ── Data Table Card ──────────────────────────────────────── */
    .table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .table-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .row-count {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f0ebff;
      color: var(--brand-purple);
      font-weight: 500;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #faf9ff;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    thead th:hover { color: var(--brand-purple); }

    thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
    thead th.sort-asc  .sort-icon { opacity: 1; }
    thead th.sort-desc .sort-icon { opacity: 1; transform: rotate(180deg); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf9ff; }

    tbody td {
      padding: 10px 14px;
      color: var(--text-primary);
      vertical-align: middle;
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* first cell slightly bolder */
    tbody td:first-child { font-weight: 500; }

    /* ── Computed column: Conversion Rate % ──────────────────── */
    th.conv-col, td.conv-col {
      background: #f0ebff;
      color: var(--brand-purple);
      font-weight: 600;
      border-left: 2px solid #d4c5f7;
    }
    th.conv-col { color: var(--brand-purple); }

    /* ── States: loading / error / empty ─────────────────────── */
    .state-box {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
    }

    .state-box .state-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .state-box p { font-size: 14px; }
    .state-box small { font-size: 12px; color: var(--text-hint); }

    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand-purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text-hint);
    }

    footer a { color: var(--brand-purple); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 13px; }
      .countdown { display: none; }
      #search-input { width: 150px; }
      .kpi-value { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
  CONFIGURATION — Edit these values to connect your sheet
  ════════════════════════════════════════════════════════════ -->
<script>
  const CONFIG = {
    /*
      SHEET_ID: The long string in your Google Sheets URL:
      https://docs.google.com/spreadsheets/d/[SHEET_ID]/edit
    */
    SHEET_ID: '1L5wC4Zzoc19h8A8SfMUffoPc_E4-beSuTN1apJevoRI',

    /*
      SHEET_NAME: The tab name to read (leave blank for the first tab).
      E.g. 'Sheet1', 'Dashboard', 'WB15'
    */
    SHEET_NAME: 'RAW',

    /*
      REFRESH_INTERVAL: How often to re-fetch data (milliseconds).
      30000 = 30 seconds   60000 = 1 minute   300000 = 5 minutes
    */
    REFRESH_INTERVAL: 30000,

    /*
      TITLE: Displayed in the header and table card.
    */
    TITLE: 'Call Count Dashboard',
  };
</script>
<!-- ════════════════════════════════════════════════════════════ -->

<!-- Top navigation bar -->
<header>
  <div class="header-left">
    <div class="logo-dot">
      <!-- Simple grid icon as logo mark -->
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
      </svg>
    </div>
    <h1 id="page-title">Call Count Dashboard</h1>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <span id="status-pill" class="loading">
      <span class="pulse"></span>
      <span id="status-text">Connecting…</span>
    </span>
  </div>
</header>

<main>

  <!-- KPI summary row (auto-populated) -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Toolbar: search + multi-select filters + refresh button -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-box" id="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search date, agent, or group…" />
        <button class="search-clear" id="search-clear" title="Clear search">✕</button>
      </div>

      <div class="msel" id="date-msel">
        <button class="msel-btn" id="date-msel-btn" type="button">
          <span id="date-msel-label">All Dates</span>
        </button>
        <div class="msel-panel" id="date-msel-panel"></div>
      </div>

      <div class="msel" id="group-msel">
        <button class="msel-btn" id="group-msel-btn" type="button">
          <span id="group-msel-label">All Groups</span>
        </button>
        <div class="msel-panel" id="group-msel-panel"></div>
      </div>

      <div class="msel" id="agent-msel">
        <button class="msel-btn" id="agent-msel-btn" type="button">
          <span id="agent-msel-label">All Agents</span>
        </button>
        <div class="msel-panel" id="agent-msel-panel"></div>
      </div>

      <button class="clear-filters-btn" id="clear-filters-btn" title="Clear all filters">Clear</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="refresh-btn" id="refresh-btn" title="Refresh now">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Insights panel (driven by current filtered/searched data) -->
  <div class="insights-grid" id="insights-grid"></div>

  <!-- Charts: trend over time + comparison by group/agent -->
  <div class="chart-section">
    <div class="chart-card">
      <h3>📈 Trend Over Time</h3>
      <div id="trend-chart-wrap"><canvas id="trend-chart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>📊 Comparison by Group</h3>
      <div id="compare-chart-wrap"><canvas id="compare-chart"></canvas></div>
    </div>
  </div>

  <!-- Data table card -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="var(--brand-purple)" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M3 15h18M9 3v18"/>
        </svg>
        <span id="table-title-text">Loading…</span>
        <span class="row-count" id="row-count" style="display:none"></span>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="table-container">
        <!-- Initial loading state -->
        <div class="state-box">
          <div class="spinner"></div>
          <p>Fetching data from Google Sheets…</p>
        </div>
      </div>
    </div>
  </div>


</main>

<script>
/*
  ═══════════════════════════════════════════════════════════════════
  CORE INTEGRATION ENGINE
  ═══════════════════════════════════════════════════════════════════

  fetchSheet()
    Calls Google's Visualization API. Returns a JSONP-style response
    (Google wraps it in `google.visualization.Query.setResponse(...)`).
    We strip that wrapper and parse the inner JSON.

  processTable(data)
    Converts the Google data table format into a flat array of row
    objects we can easily sort, filter, and render.

  render(rows)
    Builds the HTML table, KPI cards, and updates all status elements.
  ═══════════════════════════════════════════════════════════════════
*/

  /* ── State ──────────────────────────────────────────────────── */
  let allRows    = [];   // full dataset
  let filteredRows = []; // after search/filter
  let headers    = [];   // column labels
  let sortCol    = -1;   // current sort column index
  let sortAsc    = true; // sort direction

  /* Multi-select state: each holds a Set of currently checked values */
  const selected = {
    date:  new Set(),
    group: new Set(),
    agent: new Set()
  };
  let searchQuery = '';

  let trendChart   = null;
  let compareChart = null;

  /* Column names used by the Date / Group / Agent filters.
     The date filter resolves by position (always the first column)
     since sheet header labels can vary in spelling/casing.
     Group / Agent resolve by case-insensitive label match as a
     safeguard against minor header text differences. */
  const FILTER_COLS = {
    date:  null,          // resolved at runtime — first column
    group: 'Group',
    agent: 'Agent Name'
  };

  /* Numeric metric columns used for charts/insights (resolved at runtime
     against actual headers, case-insensitive, first match wins). */
  const METRIC_LABELS = ['Inbound Handled', 'AD Handled', 'Manual Handled', 'Conversion Rate %'];

  /* Find the actual header key in `headers` matching a target label,
     ignoring case/whitespace differences. Falls back to the target
     itself if no match is found. */
  function resolveHeader(target) {
    if (!target) return target;
    const norm = s => String(s).trim().toLowerCase();
    const match = headers.find(h => norm(h) === norm(target));
    return match || target;
  }

  /* ── DOM refs ───────────────────────────────────────────────── */
  const refreshBtn    = document.getElementById('refresh-btn');
  const clearFiltersBtn = document.getElementById('clear-filters-btn');
  const tableContainer= document.getElementById('table-container');
  const kpiGrid       = document.getElementById('kpi-grid');
  const insightsGrid  = document.getElementById('insights-grid');
  const statusPill    = document.getElementById('status-pill');
  const statusText    = document.getElementById('status-text');
  const lastUpdated   = document.getElementById('last-updated');
  const rowCountEl    = document.getElementById('row-count');
  const tableTitleEl  = document.getElementById('table-title-text');
  const sheetLinkEl   = { style: {}, href: '' }; // removed from UI
  const footerLinkEl  = { href: '' };             // removed from UI
  const pageTitleEl   = document.getElementById('page-title');

  const searchInput   = document.getElementById('search-input');
  const searchBoxEl   = document.getElementById('search-box');
  const searchClearBtn= document.getElementById('search-clear');

  /* Multi-select DOM refs, grouped by filter key */
  const msel = {
    date:  { root: document.getElementById('date-msel'),  panel: document.getElementById('date-msel-panel'),  label: document.getElementById('date-msel-label'),  allLabel: 'All Dates'  },
    group: { root: document.getElementById('group-msel'), panel: document.getElementById('group-msel-panel'), label: document.getElementById('group-msel-label'), allLabel: 'All Groups' },
    agent: { root: document.getElementById('agent-msel'), panel: document.getElementById('agent-msel-panel'), label: document.getElementById('agent-msel-label'), allLabel: 'All Agents' }
  };

  /* ── Initialize static text ─────────────────────────────────── */
  pageTitleEl.textContent   = CONFIG.TITLE;
  document.title            = CONFIG.TITLE;

  /* ── Fetch from Google Sheets Visualization API ─────────────── */
  async function fetchSheet() {
    /*
      The Google Visualization API endpoint. This URL works for ANY
      Google Sheet that is shared as "Anyone with the link – Viewer."
      No API key is required.

      tqx=out:json  → return JSON format
      sheet=[name]  → optional tab name
    */
    const sheetParam = CONFIG.SHEET_NAME
      ? `&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`
      : '';

    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}`
              + `/gviz/tq?tqx=out:json${sheetParam}`;

    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();

    /*
      Google wraps the response in a JS function call:
        google.visualization.Query.setResponse({...});
      We strip the wrapper to get plain JSON.
    */
    const jsonStart = text.indexOf('{');
    const jsonEnd   = text.lastIndexOf('}');
    if (jsonStart === -1) throw new Error('Unexpected response format');

    return JSON.parse(text.slice(jsonStart, jsonEnd + 1));
  }

  /* ── Convert Google data table → flat row objects ───────────── */
  function processTable(data) {
    const cols = data.table.cols;
    const rows = data.table.rows;

    /* Column headers — use label if set, else column letter (A, B, …) */
    headers = cols.map((c, i) =>
      (c.label && c.label.trim()) ? c.label.trim() : String.fromCharCode(65 + i)
    );

    /* Rows → array of plain objects { header: value, … } */
    const processed = rows
      .filter(r => r && r.c)
      .map(r =>
        Object.fromEntries(
          headers.map((h, i) => {
            const cell = r.c[i];
            return [h, cell ? (cell.f ?? cell.v ?? '') : ''];
          })
        )
      )
      .filter(r => Object.values(r).some(v => v !== '' && v !== null));

    /*
      Computed Column K: Conversion Rate %
      Formula: Column J (index 9) / SUM(Column E to Column I) (indices 4-8)
    */
    const colJ    = headers[9];
    const colsEI  = headers.slice(4, 9);
    const CONV_KEY = 'Conversion Rate %';

    if (!headers.includes(CONV_KEY)) {
      headers.push(CONV_KEY);
    }

    processed.forEach(row => {
      const j     = parseFloat(row[colJ]);
      const sumEI = colsEI.reduce((acc, h) => acc + (parseFloat(row[h]) || 0), 0);
      if (!isNaN(j) && sumEI > 0) {
        row[CONV_KEY] = ((j / sumEI) * 100).toFixed(2) + '%';
      } else {
        row[CONV_KEY] = '—';
      }
    });

    return processed;
  }

  /* ── KPI cards: first numeric column per card ───────────────── */
  function renderKPIs(rows) {
    if (!rows.length) { kpiGrid.innerHTML = ''; return; }

    /* Find numeric columns */
    const numericCols = headers.filter(h => {
      const vals = rows.map(r => r[h]).filter(v => v !== '');
      return vals.length > 0 && vals.every(v => !isNaN(parseFloat(v)));
    });

    if (!numericCols.length) { kpiGrid.innerHTML = ''; return; }

    /* Show up to 6 KPI cards */
    const cards = numericCols.slice(0, 6).map(col => {
      const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
      const total = vals.reduce((a,b) => a+b, 0);
      const display = Number.isInteger(total) ? total.toLocaleString()
                    : total.toFixed(2).replace(/\.00$/, '').toLocaleString();
      return `
        <div class="kpi-card">
          <div class="kpi-label">${escHtml(col)}</div>
          <div class="kpi-value">${display}</div>
        </div>`;
    }).join('');

    kpiGrid.innerHTML = cards;
  }

  /* ── Build the data table ────────────────────────────────────── */
  function renderTable(rows) {
    if (!rows.length) {
      tableContainer.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <p>No matching rows</p>
          <small>Try a different search or filter.</small>
        </div>`;
      return;
    }

    /* Sort */
    const sorted = [...rows].sort((a, b) => {
      if (sortCol < 0) return 0;
      const col = headers[sortCol];
      const va = a[col]; const vb = b[col];
      const na = parseFloat(va); const nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb))
        ? na - nb
        : String(va).localeCompare(String(vb), undefined, { sensitivity: 'base' });
      return sortAsc ? cmp : -cmp;
    });

    /* Header row */
    const ths = headers.map((h, i) => {
      const cls = [
        i === sortCol ? (sortAsc ? 'sort-asc' : 'sort-desc') : '',
        h === 'Conversion Rate %' ? 'conv-col' : ''
      ].filter(Boolean).join(' ');
      return `<th class="${cls}" data-col="${i}">${escHtml(h)}
                <span class="sort-icon">↑</span></th>`;
    }).join('');

    /* Data rows */
    const trs = sorted.map(row =>
      '<tr>' + headers.map(h => {
        const cls = h === 'Conversion Rate %' ? ' class="conv-col"' : '';
        return `<td${cls} title="${escHtml(String(row[h]))}">${escHtml(String(row[h]))}</td>`;
      }).join('') + '</tr>'
    ).join('');

    tableContainer.innerHTML = `
      <table>
        <thead><tr>${ths}</tr></thead>
        <tbody>${trs}</tbody>
      </table>`;

    /* Sort click handlers */
    tableContainer.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const i = parseInt(th.dataset.col);
        if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; }
        renderTable(filteredRows);
      });
    });
  }

  /* ── Resolved column keys (computed once headers are known) ─── */
  function getColKeys() {
    return {
      date:  headers[0],
      group: resolveHeader(FILTER_COLS.group),
      agent: resolveHeader(FILTER_COLS.agent)
    };
  }

  /* ── Apply multi-select filters + free-text search ──────────── */
  function applyFilter() {
    const { date: dateKey, group: groupKey, agent: agentKey } = getColKeys();
    const q = searchQuery.trim().toLowerCase();

    filteredRows = allRows.filter(row => {
      const dVal = String(row[dateKey]  ?? '');
      const gVal = String(row[groupKey] ?? '');
      const aVal = String(row[agentKey] ?? '');

      const matchDate  = selected.date.size  === 0 || selected.date.has(dVal);
      const matchGroup = selected.group.size === 0 || selected.group.has(gVal);
      const matchAgent = selected.agent.size === 0 || selected.agent.has(aVal);

      const matchSearch = !q || (
        dVal.toLowerCase().includes(q) ||
        gVal.toLowerCase().includes(q) ||
        aVal.toLowerCase().includes(q)
      );

      return matchDate && matchGroup && matchAgent && matchSearch;
    });

    rowCountEl.textContent = `${filteredRows.length} row${filteredRows.length !== 1 ? 's' : ''}`;
    renderTable(filteredRows);
    renderInsights(filteredRows);
    renderCharts(filteredRows);
  }

  /* ── Build / refresh multi-select dropdown panels ───────────── */
  function populateFilterOptions() {
    const { date: dateCol, group: groupCol, agent: agentCol } = getColKeys();

    buildMsel('date',  dateCol,  true);
    buildMsel('group', groupCol, false);
    buildMsel('agent', agentCol, false);
  }

  function buildMsel(key, colName, chronological) {
    const cfg = msel[key];
    if (!colName) return;

    let values = [...new Set(allRows.map(r => String(r[colName] ?? '').trim()).filter(Boolean))];

    if (chronological) {
      values.sort((a, b) => {
        const da = new Date(a); const db = new Date(b);
        const va = isNaN(da) ? 0 : da.getTime();
        const vb = isNaN(db) ? 0 : db.getTime();
        return va - vb;
      });
    } else {
      values.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
    }

    /* Drop any previously-selected values no longer present in data */
    selected[key].forEach(v => { if (!values.includes(v)) selected[key].delete(v); });

    const optionsHtml = values.length
      ? values.map(v => {
          const checked = selected[key].has(v) ? 'checked' : '';
          return `
            <label class="msel-option">
              <input type="checkbox" data-val="${escHtml(v)}" ${checked} />
              <span class="opt-label">${escHtml(v)}</span>
            </label>`;
        }).join('')
      : `<div class="msel-empty">No values found</div>`;

    cfg.panel.innerHTML = `
      <div class="msel-panel-actions">
        <button type="button" data-act="all">Select all</button>
        <button type="button" data-act="none">Clear</button>
      </div>
      ${optionsHtml}`;

    /* Checkbox change handlers */
    cfg.panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        const v = cb.dataset.val;
        if (cb.checked) selected[key].add(v); else selected[key].delete(v);
        updateMselLabel(key);
        applyFilter();
      });
    });

    /* Select all / clear */
    const allBtn  = cfg.panel.querySelector('[data-act="all"]');
    const noneBtn = cfg.panel.querySelector('[data-act="none"]');
    if (allBtn) allBtn.addEventListener('click', () => {
      values.forEach(v => selected[key].add(v));
      cfg.panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateMselLabel(key);
      applyFilter();
    });
    if (noneBtn) noneBtn.addEventListener('click', () => {
      selected[key].clear();
      cfg.panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateMselLabel(key);
      applyFilter();
    });

    updateMselLabel(key);
  }

  function updateMselLabel(key) {
    const cfg = msel[key];
    const n = selected[key].size;
    if (n === 0) {
      cfg.label.textContent = cfg.allLabel;
      cfg.root.querySelector('.msel-btn').classList.remove('has-selection');
    } else if (n === 1) {
      cfg.label.textContent = [...selected[key]][0];
    } else {
      cfg.label.textContent = `${n} selected`;
    }
  }

  /* Toggle open/closed for multi-select panels; close others on outside click */
  Object.entries(msel).forEach(([key, cfg]) => {
    const btn = cfg.root.querySelector('.msel-btn');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = cfg.root.classList.contains('open');
      Object.values(msel).forEach(m => m.root.classList.remove('open'));
      if (!isOpen) cfg.root.classList.add('open');
    });
  });
  document.addEventListener('click', () => {
    Object.values(msel).forEach(m => m.root.classList.remove('open'));
  });

  /* ── Insights panel: computed from currently filtered/searched rows ── */
  function renderInsights(rows) {
    if (!rows.length) { insightsGrid.innerHTML = ''; return; }

    const { date: dateKey, group: groupKey, agent: agentKey } = getColKeys();
    const metricKeys = METRIC_LABELS.map(resolveHeader).filter(k => headers.includes(k));

    const sumOf = (key) => rows.reduce((acc, r) => acc + (parseFloat(r[key]) || 0), 0);
    const avgOf = (key) => {
      const vals = rows.map(r => parseFloat(r[key])).filter(v => !isNaN(v));
      return vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : 0;
    };

    const uniqueAgents = new Set(rows.map(r => r[agentKey]).filter(Boolean)).size;
    const uniqueGroups = new Set(rows.map(r => r[groupKey]).filter(Boolean)).size;
    const uniqueDates  = new Set(rows.map(r => r[dateKey]).filter(Boolean)).size;

    /* Top group by primary volume metric (first metric found) */
    const primaryMetric = metricKeys.find(k => k !== resolveHeader('Conversion Rate %')) || metricKeys[0];
    let topGroupLine = '';
    if (primaryMetric && groupKey) {
      const byGroup = {};
      rows.forEach(r => {
        const g = r[groupKey] || '—';
        byGroup[g] = (byGroup[g] || 0) + (parseFloat(r[primaryMetric]) || 0);
      });
      const top = Object.entries(byGroup).sort((a,b) => b[1]-a[1])[0];
      if (top) topGroupLine = `${escHtml(top[0])} · ${Math.round(top[1]).toLocaleString()}`;
    }

    const cards = [];

    cards.push(`
      <div class="insight-card accent">
        <div class="ic-label">Rows in View</div>
        <div class="ic-value">${rows.length.toLocaleString()}</div>
        <div class="ic-sub">${uniqueAgents} agent${uniqueAgents!==1?'s':''} · ${uniqueGroups} group${uniqueGroups!==1?'s':''} · ${uniqueDates} period${uniqueDates!==1?'s':''}</div>
      </div>`);

    metricKeys.slice(0, 3).forEach(key => {
      const isPct = key === resolveHeader('Conversion Rate %');
      const val = isPct ? avgOf(key) : sumOf(key);
      const display = isPct ? val.toFixed(2) + '%' : Math.round(val).toLocaleString();
      cards.push(`
        <div class="insight-card">
          <div class="ic-label">${isPct ? 'Avg ' : 'Total '}${escHtml(key)}</div>
          <div class="ic-value">${display}</div>
        </div>`);
    });

    if (topGroupLine) {
      cards.push(`
        <div class="insight-card">
          <div class="ic-label">Top Group (${escHtml(primaryMetric)})</div>
          <div class="ic-value" style="font-size:15px;">${topGroupLine}</div>
        </div>`);
    }

    insightsGrid.innerHTML = cards.join('');
  }

  /* ── Charts: trend over time + comparison by group ───────────── */
  function renderCharts(rows) {
    const { date: dateKey, group: groupKey } = getColKeys();
    const metricKeys = METRIC_LABELS.map(resolveHeader).filter(k => headers.includes(k));
    const volumeMetrics = metricKeys.filter(k => k !== resolveHeader('Conversion Rate %'));
    const trendMetric = volumeMetrics[0];

    const palette = ['#ff6400', '#5000b3', '#0F6E56', '#A32D2D', '#1d6fa5'];

    /* ── Trend chart: sum of primaryMetric by date, chronological ── */
    if (!rows.length || !trendMetric || !dateKey) {
      destroyChart('trend');
      showChartEmpty('trend-chart-wrap', 'No data to chart');
    } else {
      const byDate = {};
      rows.forEach(r => {
        const d = String(r[dateKey] ?? '').trim();
        if (!d) return;
        byDate[d] = (byDate[d] || 0) + (parseFloat(r[trendMetric]) || 0);
      });
      const labels = Object.keys(byDate).sort((a, b) => {
        const da = new Date(a), db = new Date(b);
        const va = isNaN(da) ? 0 : da.getTime();
        const vb = isNaN(db) ? 0 : db.getTime();
        return va - vb;
      });
      ensureCanvas('trend-chart-wrap', 'trend-chart');
      const ctx = document.getElementById('trend-chart').getContext('2d');
      destroyChart('trend');
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: trendMetric,
            data: labels.map(l => Math.round(byDate[l])),
            borderColor: '#5000b3',
            backgroundColor: 'rgba(80,0,179,0.08)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: '#5000b3'
          }]
        },
        options: chartBaseOptions()
      });
    }

    /* ── Comparison chart: sum of volume metrics by group ────────── */
    if (!rows.length || !groupKey || !volumeMetrics.length) {
      destroyChart('compare');
      showChartEmpty('compare-chart-wrap', 'No data to chart');
    } else {
      const groups = [...new Set(rows.map(r => String(r[groupKey] ?? '').trim()).filter(Boolean))];
      const datasets = volumeMetrics.slice(0, 3).map((metric, i) => ({
        label: metric,
        data: groups.map(g => {
          const sum = rows
            .filter(r => String(r[groupKey] ?? '').trim() === g)
            .reduce((acc, r) => acc + (parseFloat(r[metric]) || 0), 0);
          return Math.round(sum);
        }),
        backgroundColor: palette[i % palette.length]
      }));
      ensureCanvas('compare-chart-wrap', 'compare-chart');
      const ctx = document.getElementById('compare-chart').getContext('2d');
      destroyChart('compare');
      compareChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: groups, datasets },
        options: chartBaseOptions()
      });
    }
  }

  function chartBaseOptions() {
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { ticks: { font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { font: { size: 10 } }, beginAtZero: true }
      }
    };
  }

  function destroyChart(which) {
    if (which === 'trend' && trendChart)   { trendChart.destroy();   trendChart = null; }
    if (which === 'compare' && compareChart) { compareChart.destroy(); compareChart = null; }
  }

  function ensureCanvas(wrapId, canvasId) {
    const wrap = document.getElementById(wrapId);
    if (!document.getElementById(canvasId)) {
      wrap.innerHTML = `<canvas id="${canvasId}"></canvas>`;
    }
  }

  function showChartEmpty(wrapId, msg) {
    document.getElementById(wrapId).innerHTML = `<div class="chart-empty">${escHtml(msg)}</div>`;
  }

  /* ── Set status pill ─────────────────────────────────────────── */
  function setStatus(state, text) {
    statusPill.className = state;
    statusText.textContent = text;
  }

  /* ── Main load function ──────────────────────────────────────── */
  async function load(isManual = false) {
    if (isManual) {
      tableContainer.innerHTML = `
        <div class="state-box">
          <div class="spinner"></div>
          <p>Refreshing…</p>
        </div>`;
    }
    setStatus('loading', 'Fetching…');

    try {
      const data = await fetchSheet();
      allRows = processTable(data);
      headers = /* re-read from closure */ headers;

      /* Render */
      renderKPIs(allRows);
      populateFilterOptions();
      filteredRows = allRows;
      applyFilter(); /* respects existing search query */

      /* Update meta */
      const now = new Date();
      lastUpdated.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      tableTitleEl.textContent = CONFIG.TITLE;
      rowCountEl.style.display = '';
      sheetLinkEl.style.display = '';
      setStatus('live', 'Live');
      // manual refresh only — no auto countdown

    } catch (err) {
      console.error('[Dashboard] Fetch error:', err);
      setStatus('error', 'Error');

      if (!allRows.length) {
        tableContainer.innerHTML = `
          <div class="state-box">
            <div class="state-icon">⚠️</div>
            <p><strong>Could not load data</strong></p>
            <small>Make sure the Google Sheet is shared as "Anyone with the link → Viewer".<br>
                   Check the browser console for details.</small>
          </div>`;
      }
    }
  }

  /* ── Helpers ─────────────────────────────────────────────────── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Event listeners ─────────────────────────────────────────── */
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    searchBoxEl.classList.toggle('has-text', searchQuery.length > 0);
    applyFilter();
  });
  searchClearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchBoxEl.classList.remove('has-text');
    applyFilter();
  });

  clearFiltersBtn.addEventListener('click', () => {
    selected.date.clear();
    selected.group.clear();
    selected.agent.clear();
    Object.keys(msel).forEach(key => {
      msel[key].panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateMselLabel(key);
    });
    searchInput.value = '';
    searchQuery = '';
    searchBoxEl.classList.remove('has-text');
    applyFilter();
  });
  refreshBtn.addEventListener('click', () => {
    load(true);
  });

  /* ── Boot ────────────────────────────────────────────────────── */
  load();
</script>
</body>
</html>
