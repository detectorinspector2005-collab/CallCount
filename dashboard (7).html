<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Count Dashboard</title>

  <!--
  ═══════════════════════════════════════════════════════════════════
  GOOGLE SHEETS INTEGRATION — HOW IT WORKS
  ═══════════════════════════════════════════════════════════════════

  REQUIREMENT: Your Google Sheet must be shared as
  "Anyone with the link → Viewer" (Share → Change to Anyone).

  HOW THE DATA IS FETCHED:
  Google exposes every public sheet through its Visualization API:
    https://docs.google.com/spreadsheets/d/{SHEET_ID}/gviz/tq?tqx=out:json

  The response is a JSON-P-like string we strip to get clean JSON.
  No API keys or OAuth are needed — it works entirely client-side.

  REAL-TIME UPDATES:
  The page polls the sheet every REFRESH_INTERVAL milliseconds.
  Any change saved in the sheet appears here automatically.
  The countdown timer shows how long until the next refresh.

  TO CONNECT YOUR OWN SHEET:
  1. Replace SHEET_ID below with your sheet's ID (from the URL).
  2. Optionally change SHEET_NAME to target a specific tab.
  3. Change REFRESH_INTERVAL to control poll frequency (ms).
  ═══════════════════════════════════════════════════════════════════
  -->

  <style>
    /* ── Brand Tokens ─────────────────────────────────────────── */
    :root {
      --brand-orange: #ff6400;
      --brand-purple: #5000b3;
      --brand-black:  #111111;
      --brand-white:  #ffffff;
      --surface:      #f8f7fc;
      --card-bg:      #ffffff;
      --border:       #e4e0ef;
      --text-primary: #111111;
      --text-muted:   #6b6b80;
      --text-hint:    #9a9aaa;
      --radius:       10px;
      --radius-sm:    6px;
    }

    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Top Nav / Header ─────────────────────────────────────── */
    header {
      background: var(--brand-purple);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--brand-orange);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-dot svg { width: 14px; height: 14px; fill: #fff; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    /* ── Live status pill ─────────────────────────────────────── */
    #status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255,255,255,0.12);
      color: #fff;
      transition: background 0.3s;
    }

    #status-pill.loading  { background: rgba(255,255,255,0.12); }
    #status-pill.live     { background: rgba(0,200,100,0.25); color: #4fffaa; }
    #status-pill.error    { background: rgba(255,60,60,0.25);  color: #ff9090; }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Main Layout ──────────────────────────────────────────── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Toolbar (filter + refresh info) ─────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .search-box {
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      stroke: var(--text-muted);
      fill: none;
    }

    #search-input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px 7px 32px;
      font-size: 13px;
      background: var(--card-bg);
      color: var(--text-primary);
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    #search-input:focus { border-color: var(--brand-purple); }

    #date-filter, #group-filter, #agent-filter {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 13px;
      background: var(--card-bg);
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      max-width: 160px;
    }

    #date-filter:focus, #group-filter:focus, #agent-filter:focus {
      border-color: var(--brand-purple);
    }

    .clear-filters-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-filters-btn:hover {
      border-color: var(--brand-orange);
      color: var(--brand-orange);
    }

    .refresh-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--brand-purple);
      background: transparent;
      color: var(--brand-purple);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .refresh-btn:hover { background: var(--brand-purple); color: #fff; }

    .refresh-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    .countdown {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Summary KPI Cards ────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--brand-orange);
      border-radius: 3px 0 0 3px;
    }

    .kpi-card:nth-child(even)::before { background: var(--brand-purple); }

    .kpi-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* ── Data Table Card ──────────────────────────────────────── */
    .table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .table-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .row-count {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f0ebff;
      color: var(--brand-purple);
      font-weight: 500;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #faf9ff;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    thead th:hover { color: var(--brand-purple); }

    thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
    thead th.sort-asc  .sort-icon { opacity: 1; }
    thead th.sort-desc .sort-icon { opacity: 1; transform: rotate(180deg); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf9ff; }

    tbody td {
      padding: 10px 14px;
      color: var(--text-primary);
      vertical-align: middle;
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* first cell slightly bolder */
    tbody td:first-child { font-weight: 500; }

    /* ── Computed column: Conversion Rate % ──────────────────── */
    th.conv-col, td.conv-col {
      background: #f0ebff;
      color: var(--brand-purple);
      font-weight: 600;
      border-left: 2px solid #d4c5f7;
    }
    th.conv-col { color: var(--brand-purple); }

    /* ── States: loading / error / empty ─────────────────────── */
    .state-box {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
    }

    .state-box .state-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .state-box p { font-size: 14px; }
    .state-box small { font-size: 12px; color: var(--text-hint); }

    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand-purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text-hint);
    }

    footer a { color: var(--brand-purple); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 13px; }
      .countdown { display: none; }
      #search-input { width: 150px; }
      .kpi-value { font-size: 20px; }
    }
  </style>
</head>
<body>

<script>

    SHEET_ID: '1L5wC4Zzoc19h8A8SfMUffoPc_E4-beSuTN1apJevoRI',

    */

  };
</script>
<!-- ════════════════════════════════════════════════════════════ -->

<!-- Top navigation bar -->
<header>
  <div class="header-left">
    <div class="logo-dot">
      <!-- Simple grid icon as logo mark -->
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>

</header>

<main>

  <!-- KPI summary row (auto-populated) -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Toolbar: filters + refresh button -->
  <div class="toolbar">
    <div class="toolbar-left">
      <select id="date-filter"><option value="">All Dates</option></select>
      <select id="group-filter"><option value="">All Groups</option></select>

  <div class="table-card">

             stroke="var(--brand-purple)" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2"/>

<script>
/*
  ═══════════════════════════════════════════════════════════════════
  CORE INTEGRATION ENGINE
  ═══════════════════════════════════════════════════════════════════

  fetchSheet()
    Calls Google's Visualization API. Returns a JSONP-style response
    (Google wraps it in `google.visualization.Query.setResponse(...)`).
    We strip that wrapper and parse the inner JSON.

  processTable(data)
    Converts the Google data table format into a flat array of row
    objects we can easily sort, filter, and render.

  render(rows)
    Builds the HTML table, KPI cards, and updates all status elements.
  ═══════════════════════════════════════════════════════════════════
*/

  /* ── State ──────────────────────────────────────────────────── */
  let allRows    = [];   // full dataset
  let filteredRows = []; // after search/filter
  let headers    = [];   // column labels
  let sortCol    = -1;   // current sort column index
  let sortAsc    = true; // sort direction

  /* Column names used by the Date / Group / Agent filters.
     The date filter resolves by position (always the first column)
     since sheet header labels can vary in spelling/casing.
     Group / Agent resolve by case-insensitive label match as a
     safeguard against minor header text differences. */
  const FILTER_COLS = {
    date:  null,          // resolved at runtime — first column
    group: 'Group',
    agent: 'Agent Name'
  };

  /* Find the actual header key in `headers` matching a target label,
     ignoring case/whitespace differences. Falls back to the target
     itself if no match is found. */
  function resolveHeader(target) {
    if (!target) return target;
    const norm = s => String(s).trim().toLowerCase();
    const match = headers.find(h => norm(h) === norm(target));
    return match || target;
  }
  let countdownTimer = null;
  let refreshTimer   = null;
  let secondsLeft    = 0;

  /* ── DOM refs ───────────────────────────────────────────────── */
  const refreshBtn    = document.getElementById('refresh-btn');
  const dateFilter    = document.getElementById('date-filter');
  const groupFilter   = document.getElementById('group-filter');
  const agentFilter   = document.getElementById('agent-filter');
  const clearFiltersBtn = document.getElementById('clear-filters-btn');
  const tableContainer= document.getElementById('table-container');
  const kpiGrid       = document.getElementById('kpi-grid');
  const statusPill    = document.getElementById('status-pill');
  const statusText    = document.getElementById('status-text');
  const lastUpdated   = document.getElementById('last-updated');
  const rowCountEl    = document.getElementById('row-count');
  const tableTitleEl  = document.getElementById('table-title-text');
  const sheetLinkEl   = { style: {}, href: '' }; // removed from UI
  const footerLinkEl  = { href: '' };             // removed from UI
  const pageTitleEl   = document.getElementById('page-title');

  /* ── Initialize static text ─────────────────────────────────── */
  pageTitleEl.textContent   = CONFIG.TITLE;
  document.title            = CONFIG.TITLE;

  /* ── Fetch from Google Sheets Visualization API ─────────────── */
  async function fetchSheet() {
    /*
      The Google Visualization API endpoint. This URL works for ANY
      Google Sheet that is shared as "Anyone with the link – Viewer."
      No API key is required.

      tqx=out:json  → return JSON format
      sheet=[name]  → optional tab name
    */
    const sheetParam = CONFIG.SHEET_NAME
      ? `&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`
      : '';

    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}`
              + `/gviz/tq?tqx=out:json${sheetParam}`;

    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();

    /*
      Google wraps the response in a JS function call:
        google.visualization.Query.setResponse({...});
      We strip the wrapper to get plain JSON.
    */
    const jsonStart = text.indexOf('{');
    const jsonEnd   = text.lastIndexOf('}');
    if (jsonStart === -1) throw new Error('Unexpected response format');

    return JSON.parse(text.slice(jsonStart, jsonEnd + 1));
  }

  /* ── Convert Google data table → flat row objects ───────────── */
  function processTable(data) {
    const cols = data.table.cols;
    const rows = data.table.rows;

    /* Column headers — use label if set, else column letter (A, B, …) */
    headers = cols.map((c, i) =>
      (c.label && c.label.trim()) ? c.label.trim() : String.fromCharCode(65 + i)
    );

    /* Rows → array of plain objects { header: value, … } */
    const processed = rows
      .filter(r => r && r.c)
      .map(r =>
        Object.fromEntries(
          headers.map((h, i) => {
            const cell = r.c[i];
            return [h, cell ? (cell.f ?? cell.v ?? '') : ''];
          })
        )
      )
      .filter(r => Object.values(r).some(v => v !== '' && v !== null));

    /*
      Computed Column K: Conversion Rate %
      Formula: Column J (index 9) / SUM(Column E to Column I) (indices 4-8)
    */
    const colJ    = headers[9];
    const colsEI  = headers.slice(4, 9);
    const CONV_KEY = 'Conversion Rate %';

    if (!headers.includes(CONV_KEY)) {
      headers.push(CONV_KEY);
    }

    processed.forEach(row => {
      const j     = parseFloat(row[colJ]);
      const sumEI = colsEI.reduce((acc, h) => acc + (parseFloat(row[h]) || 0), 0);
      if (!isNaN(j) && sumEI > 0) {
        row[CONV_KEY] = ((j / sumEI) * 100).toFixed(2) + '%';
      } else {
        row[CONV_KEY] = '—';
      }
    });

    return processed;
  }

  /* ── KPI cards: first numeric column per card ───────────────── */
  function renderKPIs(rows) {
    if (!rows.length) { kpiGrid.innerHTML = ''; return; }

    /* Find numeric columns */
    const numericCols = headers.filter(h => {
      const vals = rows.map(r => r[h]).filter(v => v !== '');
      return vals.length > 0 && vals.every(v => !isNaN(parseFloat(v)));
    });

    if (!numericCols.length) { kpiGrid.innerHTML = ''; return; }

    /* Show up to 6 KPI cards */
    const cards = numericCols.slice(0, 6).map(col => {
      const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
      const total = vals.reduce((a,b) => a+b, 0);
      const display = Number.isInteger(total) ? total.toLocaleString()
                    : total.toFixed(2).replace(/\.00$/, '').toLocaleString();
      return `
        <div class="kpi-card">
          <div class="kpi-label">${escHtml(col)}</div>
          <div class="kpi-value">${display}</div>
        </div>`;
    }).join('');

    kpiGrid.innerHTML = cards;
  }

  /* ── Build the data table ────────────────────────────────────── */
  function renderTable(rows) {
    if (!rows.length) {
      tableContainer.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <p>No matching rows</p>
          <small>Try a different search or filter.</small>
        </div>`;
      return;
    }

    /* Sort */
    const sorted = [...rows].sort((a, b) => {
      if (sortCol < 0) return 0;
      const col = headers[sortCol];
      const va = a[col]; const vb = b[col];
      const na = parseFloat(va); const nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb))
        ? na - nb
        : String(va).localeCompare(String(vb), undefined, { sensitivity: 'base' });
      return sortAsc ? cmp : -cmp;
    });

    /* Header row */
    const ths = headers.map((h, i) => {
      const cls = [
        i === sortCol ? (sortAsc ? 'sort-asc' : 'sort-desc') : '',
        h === 'Conversion Rate %' ? 'conv-col' : ''
      ].filter(Boolean).join(' ');
      return `<th class="${cls}" data-col="${i}">${escHtml(h)}
                <span class="sort-icon">↑</span></th>`;
    }).join('');

    /* Data rows */
    const trs = sorted.map(row =>
      '<tr>' + headers.map(h => {
        const cls = h === 'Conversion Rate %' ? ' class="conv-col"' : '';
        return `<td${cls} title="${escHtml(String(row[h]))}">${escHtml(String(row[h]))}</td>`;
      }).join('') + '</tr>'
    ).join('');

    tableContainer.innerHTML = `
      <table>
        <thead><tr>${ths}</tr></thead>
        <tbody>${trs}</tbody>
      </table>`;

    /* Sort click handlers */
    tableContainer.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const i = parseInt(th.dataset.col);
        if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; }
        renderTable(filteredRows);
      });
    });
  }

  /* ── Apply dropdown filters (Date / Group / Agent) ──────────── */
  function applyFilter() {
    const dateVal  = dateFilter.value;
    const groupVal = groupFilter.value;
    const agentVal = agentFilter.value;

    const dateKey  = headers[0]; // date is always the first column
    const groupKey = resolveHeader(FILTER_COLS.group);
    const agentKey = resolveHeader(FILTER_COLS.agent);

    filteredRows = allRows.filter(row => {
      const matchDate  = !dateVal  || String(row[dateKey]  ?? '') === dateVal;
      const matchGroup = !groupVal || String(row[groupKey] ?? '') === groupVal;
      const matchAgent = !agentVal || String(row[agentKey] ?? '') === agentVal;
      return matchDate && matchGroup && matchAgent;
    });

    rowCountEl.textContent = `${filteredRows.length} row${filteredRows.length !== 1 ? 's' : ''}`;
    renderTable(filteredRows);
  }

  /* ── Populate filter dropdown options from current data ─────── */
  function populateFilterOptions() {
    const dateCol  = headers[0]; // date is always the first column
    const groupCol = resolveHeader(FILTER_COLS.group);
    const agentCol = resolveHeader(FILTER_COLS.agent);

    const buildOptions = (selectEl, colName, allLabel, currentVal, chronological) => {
      if (!colName) return;
      const values = [...new Set(allRows.map(r => String(r[colName] ?? '').trim()).filter(Boolean))];

      if (chronological) {
        values.sort((a, b) => {
          const da = new Date(a); const db = new Date(b);
          const va = isNaN(da) ? 0 : da.getTime();
          const vb = isNaN(db) ? 0 : db.getTime();
          return va - vb;
        });
      } else {
        values.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      }

      selectEl.innerHTML = `<option value="">${allLabel}</option>`
        + values.map(v => `<option value="${escHtml(v)}">${escHtml(v)}</option>`).join('');
      if (values.includes(currentVal)) selectEl.value = currentVal;
    };

    buildOptions(dateFilter,  dateCol,  'All Dates',  dateFilter.value, true);
    buildOptions(groupFilter, groupCol, 'All Groups', groupFilter.value, false);
    buildOptions(agentFilter, agentCol, 'All Agents', agentFilter.value, false);
  }

  /* ── Set status pill ─────────────────────────────────────────── */
  function setStatus(state, text) {
    statusPill.className = state;
    statusText.textContent = text;
  }

  /* ── Main load function ──────────────────────────────────────── */
  async function load(isManual = false) {
    if (isManual) {
      tableContainer.innerHTML = `
        <div class="state-box">
          <div class="spinner"></div>
          <p>Refreshing…</p>
        </div>`;
    }
    setStatus('loading', 'Fetching…');

    try {
      const data = await fetchSheet();
      allRows = processTable(data);
      headers = /* re-read from closure */ headers;

      /* Render */
      renderKPIs(allRows);
      populateFilterOptions();
      filteredRows = allRows;
      applyFilter(); /* respects existing search query */

      /* Update meta */
      const now = new Date();
      lastUpdated.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      tableTitleEl.textContent = CONFIG.TITLE;
      rowCountEl.style.display = '';
      sheetLinkEl.style.display = '';
      setStatus('live', 'Live');
      // manual refresh only — no auto countdown

    } catch (err) {
      console.error('[Dashboard] Fetch error:', err);
      setStatus('error', 'Error');

      if (!allRows.length) {
        tableContainer.innerHTML = `
          <div class="state-box">
            <div class="state-icon">⚠️</div>
            <p><strong>Could not load data</strong></p>
            <small>Make sure the Google Sheet is shared as "Anyone with the link → Viewer".<br>
                   Check the browser console for details.</small>
          </div>`;
      }
    }
  }

  /* ── Helpers ─────────────────────────────────────────────────── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Event listeners ─────────────────────────────────────────── */
  dateFilter.addEventListener('change', applyFilter);
  groupFilter.addEventListener('change', applyFilter);
  agentFilter.addEventListener('change', applyFilter);
  clearFiltersBtn.addEventListener('click', () => {
    dateFilter.value = '';
    groupFilter.value = '';
    agentFilter.value = '';
    applyFilter();
  });
  refreshBtn.addEventListener('click', () => {
    load(true);
  });

  /* ── Boot ────────────────────────────────────────────────────── */
  load();
</script>
</body>
</html>
